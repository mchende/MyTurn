<div class="flex h-screen bg-[#F9FAFB] overflow-hidden text-[#1F2937] font-sans">
  
  <!-- 1. 左侧导航栏：彻底修复图标语义 -->
  <aside class="w-24 lg:w-32 border-r border-gray-100 bg-white flex flex-col items-center py-10 justify-between shrink-0">
    <div class="space-y-12 w-full">
      <!-- 品牌 Logo -->
      <div class="w-14 h-14 bg-[#10B981] rounded-2xl flex items-center justify-center text-white shadow-xl shadow-emerald-100 mx-auto">
        <i data-lucide="sparkles" class="w-8 h-8 fill-current"></i>
      </div>
      
      <!-- 导航菜单 -->
      <nav class="space-y-10 w-full px-2">
        <!-- 主页 -->
        <div class="flex flex-col items-center gap-2 cursor-pointer text-[#10B981]">
          <div class="p-4 bg-[#10B981]/10 rounded-2xl">
            <i data-lucide="home" class="w-8 h-8"></i>
          </div>
          <span class="text-sm font-black tracking-tight">我的课堂</span>
        </div>

        <!-- 日程 -->
        <div class="flex flex-col items-center gap-2 cursor-pointer text-gray-300 hover:text-gray-500">
          <div class="p-4 rounded-2xl">
            <i data-lucide="calendar-days" class="w-8 h-8"></i>
          </div>
          <span class="text-sm font-black tracking-tight">课程表</span>
        </div>

        <!-- 成就 -->
        <div class="flex flex-col items-center gap-2 cursor-pointer text-gray-300 hover:text-gray-500">
          <div class="p-4 rounded-2xl">
            <i data-lucide="trophy" class="w-8 h-8"></i>
          </div>
          <span class="text-sm font-black tracking-tight">成就奖状</span>
        </div>
      </nav>
    </div>

    <div class="text-gray-300 hover:text-gray-500 cursor-pointer">
      <i data-lucide="settings" class="w-8 h-8"></i>
    </div>
  </aside>

  <!-- 右侧主内容区 -->
  <main class="flex-1 flex flex-col min-w-0 h-full">
    
    <!-- 顶部状态栏 -->
    <header class="h-24 px-10 flex items-center justify-between bg-white/40 backdrop-blur-md border-b border-gray-100 shrink-0">
      <div class="flex items-center gap-4">
        <h2 class="text-3xl font-black tracking-tighter">MyTurn</h2>
        <span class="text-gray-300">|</span>
        <p class="text-sm font-bold text-gray-400">4月15日 星期三</p>
      </div>
      
      <!-- 今日目标：印章逻辑 -->
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-3 px-4 py-2 bg-orange-50 rounded-xl border border-orange-100 text-orange-600">
          <i data-lucide="flame" class="w-5 h-5 fill-current"></i>
          <span class="text-lg font-black">12 天连胜</span>
        </div>

        <div class="flex items-center gap-4">
          <div class="text-right leading-none">
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">今日任务</p>
            <p class="text-sm font-bold text-gray-500 italic tracking-tight">完成一节课</p>
          </div>
          <!-- 印章位 -->
          <div class="w-12 h-12 rounded-full border-4 border-dashed border-gray-100 flex items-center justify-center bg-gray-50/50">
             <i data-lucide="check" class="w-7 h-7 text-gray-200"></i>
          </div>
        </div>
      </div>
    </header>

    <!-- 核心布局区：使用 flex-1 和 min-h-0 实现真正的响应式 -->
    <div class="flex-1 flex p-8 gap-8 overflow-hidden min-h-0">
      
      <!-- 左侧：课堂聚焦 (使用 flex-col 确保内容不溢出) -->
      <section class="flex-[2] flex flex-col min-w-0 h-full">
        <div class="flex-1 bg-white rounded-[48px] border border-gray-100 shadow-[0_20px_60px_rgba(0,0,0,0.03)] p-10 flex flex-col justify-between overflow-hidden">
          
          <!-- 上部信息 -->
          <div class="space-y-6">
            <div class="flex justify-between items-start">
              <span class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-[#10B981] text-white text-xs font-black shadow-lg shadow-emerald-100">
                <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                检票入场中
              </span>
              <div class="text-right bg-gray-50 px-6 py-3 rounded-3xl border border-gray-100">
                <p class="text-[10px] font-black text-gray-400 tracking-widest mb-1 uppercase">距离开课</p>
                <p class="text-4xl font-mono font-black text-[#10B981]">02:45</p>
              </div>
            </div>

            <div>
              <h1 class="text-5xl font-black text-[#1F2937] leading-tight">每日语感启蒙</h1>
              <p class="text-xl text-gray-400 font-bold mt-2 italic">第 4 周：动物园大冒险</p>
            </div>
          </div>

          <!-- 中部角色：自适应间距 -->
          <div class="flex items-center gap-10 py-8 border-y border-gray-50 my-6">
            <div class="flex items-center gap-5">
              <div class="relative shrink-0">
                  <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Cora" class="w-20 h-20 rounded-[28px] bg-emerald-50 border-4 border-white shadow-md">
                  <span class="absolute -bottom-2 -right-1 bg-emerald-500 text-white text-[10px] font-black px-2 py-0.5 rounded-lg">主讲</span>
              </div>
              <p class="text-xl font-black italic">Cora 老师</p>
            </div>
            
            <div class="w-8 h-[2px] bg-gray-100"></div>

            <div class="flex items-center gap-5">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=AI" class="w-20 h-20 rounded-[28px] bg-blue-50 border-4 border-white shadow-md shrink-0">
              <p class="text-xl font-black italic text-blue-600">同学 Bobby</p>
            </div>
          </div>

          <!-- 底部按钮：不再设置固定高度，确保显示完整 -->
          <button class="w-full bg-[#10B981] hover:bg-[#059669] text-white py-8 lg:py-10 rounded-[36px] text-3xl font-black shadow-2xl shadow-emerald-200 transition-all active:scale-[0.98] flex items-center justify-center gap-4 shrink-0">
            <i data-lucide="door-open" class="w-8 h-8"></i>
            进入教室
          </button>
        </div>
      </section>

      <!-- 右侧：时刻表 -->
      <section class="flex-1 flex flex-col min-w-0 h-full">
        <div class="flex-1 bg-white/70 rounded-[48px] border border-gray-100 p-8 flex flex-col shadow-sm overflow-hidden">
          <div class="flex items-center justify-between mb-8 shrink-0">
            <h3 class="text-xl font-black tracking-tight">今日课堂场次</h3>
            <span class="text-[11px] font-black text-[#10B981] bg-emerald-50 px-3 py-1.5 rounded-xl">每节 15 分钟</span>
          </div>
          
          <!-- 可滚动的列表区域 -->
          <div class="flex-1 overflow-y-auto space-y-4 pr-1 custom-scrollbar min-h-0">
            <!-- 场次 1 -->
            <div class="flex items-center gap-4 p-5 rounded-3xl bg-gray-50 opacity-40">
              <span class="text-lg font-mono font-bold w-14 text-gray-400 tracking-tighter">16:00</span>
              <div class="h-2 w-2 rounded-full bg-gray-300"></div>
              <span class="font-bold text-gray-400">已结束</span>
            </div>

            <!-- 进行中 -->
            <div class="flex items-center gap-4 p-6 rounded-[32px] bg-[#10B981] text-white shadow-xl shadow-emerald-100 scale-[1.02]">
              <span class="text-2xl font-mono font-black w-14 tracking-tighter">17:00</span>
              <div class="h-3 w-3 rounded-full bg-white shadow-[0_0_10px_white]"></div>
              <div class="flex-1">
                <p class="text-lg font-black leading-none">正在检票</p>
              </div>
            </div>

            <!-- 下一节 -->
            <div class="flex items-center gap-4 p-5 rounded-3xl border-2 border-dashed border-gray-100">
              <span class="text-lg font-mono font-bold w-14 text-gray-300 tracking-tighter">18:00</span>
              <div class="h-2 w-2 rounded-full bg-gray-100"></div>
              <span class="font-bold text-gray-200 tracking-tight">尚未开放</span>
            </div>
          </div>

          <!-- 提示说明项 -->
          <div class="mt-6 pt-6 border-t border-gray-100 shrink-0">
             <div class="flex items-start gap-3 text-gray-400">
                <i data-lucide="help-circle" class="w-4 h-4 mt-1 shrink-0"></i>
                <p class="text-xs font-bold leading-relaxed">错过场次了吗？别担心，你可以预约明天的相同时间入场练习。</p>
             </div>
          </div>
        </div>
      </section>

    </div>
  </main>
</div>

<!-- 修正后的图标初始化 -->
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
