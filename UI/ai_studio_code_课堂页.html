<div class="flex h-screen bg-[#0F172A] overflow-hidden text-white font-sans flex-col p-4 lg:p-6 relative">
  
  <!-- 1. 顶部状态栏 -->
  <header class="h-20 flex items-center justify-between px-4 shrink-0 mb-4 z-20">
    <div class="flex items-center gap-3 w-1/4">
      <div class="w-10 h-10 bg-[#10B981] rounded-xl flex items-center justify-center shadow-lg">
        <i data-lucide="sparkles" class="w-6 h-6 fill-current"></i>
      </div>
      <h1 class="text-xl font-black tracking-tighter">MyTurn</h1>
    </div>

    <!-- 学生席位：此时“我”的席位是激活态 -->
    <div class="flex-1 flex justify-center">
      <div class="flex items-center gap-4 bg-white/5 p-2 rounded-[24px] border border-white/5 backdrop-blur-md">
        <!-- 我：状态切换为“在讲台” -->
        <div class="relative group">
          <div class="w-14 h-14 rounded-2xl bg-[#10B981] p-0.5 border-2 border-[#10B981] opacity-50">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Me" class="w-full h-full rounded-[14px] bg-white grayscale">
          </div>
          <div class="absolute inset-0 flex items-center justify-center">
             <span class="text-[8px] font-black bg-black/60 px-1.5 py-0.5 rounded uppercase">讲台中</span>
          </div>
        </div>
        <!-- AI 同学 -->
        <div class="w-14 h-14 rounded-2xl bg-slate-800 p-0.5 border border-slate-700">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bobby" class="w-full h-full rounded-[14px] bg-slate-800">
        </div>
        <!-- 空位 -->
        <div class="w-14 h-14 rounded-2xl border-2 border-dashed border-slate-800 flex items-center justify-center text-slate-800">
           <i data-lucide="plus" class="w-5 h-5 opacity-20"></i>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 w-1/4">
      <button class="px-5 py-2.5 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-bold transition-all">
        退出课堂
      </button>
    </div>
  </header>

  <!-- 2. 中间核心区 -->
  <div class="flex-1 flex gap-6 min-h-0 z-10">
    
    <!-- 左侧：课件区 (D-18) -->
    <main class="flex-[2.5] bg-slate-900 rounded-[48px] border-4 border-slate-800 overflow-hidden relative shadow-2xl group">
      <!-- 课件内容 -->
      <img src="https://images.unsplash.com/photo-1518173946687-a4c8a07a7e8e?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover">
      
      <!-- 老师点名时的视觉提示 (遮罩) -->
      <div class="absolute inset-0 bg-black/20 pointer-events-none"></div>
      
      <!-- 进度指示器 -->
      <div class="absolute bottom-8 left-8 flex gap-2.5">
        <div class="w-10 h-2 rounded-full bg-[#10B981]"></div>
        <div class="w-2 h-2 rounded-full bg-white/20"></div>
        <div class="w-2 h-2 rounded-full bg-white/20"></div>
        <div class="w-2 h-2 rounded-full bg-white/20"></div>
      </div>
    </main>

    <!-- 右侧：交互纵轴 (D-19, D-20) -->
    <aside class="flex-1 flex flex-col gap-6 w-full max-w-[360px]">
      
      <!-- 教师区：正在点名/引导状态 -->
      <section class="flex-[0.8] bg-slate-800/80 rounded-[40px] border-2 border-slate-700 p-6 flex flex-col items-center justify-center relative overflow-hidden">
        <div class="relative z-10 text-center">
            <div class="w-28 h-28 rounded-full bg-emerald-500/20 p-1.5 mb-3 relative">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Cora" class="w-full h-full rounded-full bg-white shadow-xl">
                <!-- 老师说话动效 -->
                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-[#10B981] px-3 py-1 rounded-full flex gap-1 items-center">
                  <div class="w-1 h-3 bg-white/80 rounded-full animate-bounce [animation-duration:0.6s]"></div>
                  <div class="w-1 h-4 bg-white/80 rounded-full animate-bounce [animation-duration:0.8s]"></div>
                  <div class="w-1 h-2 bg-white/80 rounded-full animate-bounce [animation-duration:0.5s]"></div>
                </div>
            </div>
            <p class="text-xl font-black italic tracking-tight">Cora 老师</p>
            <p class="text-[11px] font-bold text-[#10B981] mt-1">“It's your turn! Say LION!”</p>
        </div>
      </section>

      <!-- 讲台区：实时摄像头画面状态 -->
      <section class="flex-1 bg-slate-800 rounded-[40px] border-4 border-[#10B981] p-2 flex flex-col items-center justify-center relative overflow-hidden shadow-[0_0_40px_rgba(16,185,129,0.2)]">
        
        <!-- 模拟摄像头实时画面容器 -->
        <div class="relative w-full h-full rounded-[32px] overflow-hidden bg-slate-900 flex items-center justify-center">
            <!-- 占位符：真实开发时这里放置 <video> 标签 -->
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Me" class="w-3/4 h-3/4 object-contain opacity-90 scale-110">
            
            <!-- 摄像头叠加层：角落的小标识 -->
            <div class="absolute top-4 left-4 flex items-center gap-2 bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-white/80">LIVE</span>
            </div>

            <!-- 底部：音量反馈波形 -->
            <div class="absolute bottom-6 left-6 right-6 h-12 flex items-end justify-center gap-1.5">
                <div class="w-2 bg-[#10B981] h-1/2 rounded-full"></div>
                <div class="w-2 bg-[#10B981] h-3/4 rounded-full"></div>
                <div class="w-2 bg-[#10B981] h-full rounded-full shadow-[0_0_15px_#10B981]"></div>
                <div class="w-2 bg-[#10B981] h-2/3 rounded-full"></div>
                <div class="w-2 bg-[#10B981] h-1/2 rounded-full"></div>
            </div>
        </div>

        <!-- 讲台标签 -->
        <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#10B981] text-white text-[10px] font-black px-4 py-1 rounded-full shadow-lg">
            你的发言时间
        </div>
      </section>

    </aside>
  </div>

  <!-- 全局氛围装饰：模拟灯光 -->
  <div class="absolute top-0 left-0 w-1/3 h-1/2 bg-emerald-500/5 blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-0 right-0 w-1/4 h-1/3 bg-blue-500/5 blur-[120px] pointer-events-none"></div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
